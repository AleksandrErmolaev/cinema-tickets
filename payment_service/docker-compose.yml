  payment-db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    ports:
      - "5434:5432"

  payment-service:
    build: ./payment_service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@payment-db:5432/payment_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_SUCCESS_RATE: 0.8
    depends_on:
      - payment-db
      - kafka
services:
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres-auth:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"

  postgres-booking:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: booking_db
    ports:
      - "5433:5432"

  postgres-payment:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    ports:
      - "5434:5432"

  postgres-movie:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: movies
    ports:
      - "5435:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"    # API (исправлено!)
      - "9101:9001"    # Console

  auth-service:
    build: ./auth_service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres-auth:5432/users_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET_KEY: your-secret-key
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: 60
    depends_on:
      postgres-auth:
        condition: service_started
      kafka:
        condition: service_healthy

  movie-service:
    build: ./movie_service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres-movie:5432/movies
    depends_on:
      - postgres-movie

  booking-service:
    build: ./booking_service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres-booking:5432/booking_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BOOKING_TTL_MINUTES: 10
    depends_on:
      postgres-booking:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_healthy

  payment-service:
    build: ./payment_service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres-payment:5432/payment_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_SUCCESS_RATE: 0.8
    depends_on:
      postgres-payment:
        condition: service_started
      kafka:
        condition: service_healthy

  analytics-service:
    build: ./analytics_service
    ports:
      - "8006:8006"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPICS: user.events,booking.events,payment.events
      KAFKA_GROUP_ID: analytics-group
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: analytics-events
      MINIO_SECURE: False
      HEALTH_PORT: 8006
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started

  notification-service:
    build: ./notification_service
    ports:
      - "8004:8000"
    environment:
      KAFKA_BROKER: kafka:9092
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: study1423
      SMTP_PASS: jfggnodsngovn
      FROM_EMAIL: study1423@gmail.com
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  redis_data: